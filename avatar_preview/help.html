<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASL Avatar — HELP (VRM)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0e1116; color: #e6edf3;
    font: 14px/1.45 system-ui, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  .panel { position: absolute; top: 14px; left: 14px; width: 270px;
    background: rgba(20,25,33,.86); backdrop-filter: blur(8px);
    border: 1px solid #2a313c; border-radius: 12px; padding: 14px 16px; }
  .panel h1 { font-size: 15px; margin: 0 0 2px; }
  .panel .sub { color: #8b97a7; font-size: 12px; margin: 0 0 12px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 9px 0; }
  .row label { color: #b9c4d0; font-size: 12.5px; }
  .row output { color: #6cc6ff; font-variant-numeric: tabular-nums; min-width: 46px; text-align: right; }
  input[type=range] { width: 130px; accent-color: #4a93ff; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  button { flex: 1; cursor: pointer; border: 1px solid #313a47; background: #202833;
    color: #e6edf3; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  button:hover { border-color: #4a93ff; }
  button.primary { background: #1f6f3f; border-color: #2a8f52; }
  button.primary:hover { background: #258048; }
  .schema { position: absolute; right: 14px; top: 14px; width: 318px;
    background: rgba(20,25,33,.86); border: 1px solid #2a313c; border-radius: 12px; padding: 12px 14px; }
  .schema .gtitle { color: #7d8794; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .schema pre { margin: 0; font: 11.5px/1.5 Consolas, monospace; color: #c9d4e0; white-space: pre-wrap; }
  .schema .k { color: #ff9d6c; } .schema .v { color: #6cc6ff; } .schema .s { color: #9fe88d; }
  .phase { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: rgba(20,25,33,.9); border: 1px solid #2a313c; border-radius: 999px;
    padding: 7px 16px; font-size: 12.5px; }
  .phase b { color: #6fe39a; }
  .warn { position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    background: #1d2a16; border: 1px solid #3a5a22; color: #b6e88a; font-size: 11.5px;
    padding: 6px 14px; border-radius: 8px; max-width: 64ch; text-align: center; }
  .err { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    color: #ff8a8a; font-size: 13px; max-width: 70ch; text-align: center; display: none; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="app"></div>

<div class="panel">
  <h1>HELP <span style="color:#6fe39a">●</span></h1>
  <p class="sub">VRM avatar, posed from <code>signs/help.py</code></p>
  <div class="row"><label>Speed</label><input id="speed" type="range" min="0.25" max="2" step="0.05" value="1"><output id="speedV"></output></div>
  <div class="btns">
    <button id="replay" class="primary">▶ Replay</button>
    <button id="loop">⟳ Loop: on</button>
  </div>
  <div class="btns">
    <button id="front">Front</button>
    <button id="side">Side</button>
    <button id="threeq">3/4</button>
  </div>
</div>

<div class="schema">
  <div class="gtitle">Sign Definition Schema (mirrors recognition)</div>
  <pre id="schemaPre"></pre>
</div>

<div class="warn">Uncalibrated procedural pose — a fluent/Deaf signer should verify before real use (paper Phase&nbsp;6).</div>
<div class="phase">Animation: <b id="phaseLbl">loading…</b></div>
<div class="err" id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.js"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* SIGN DEFINITION SCHEMA — from ASL_Game/signs/help.py (recognition is source of truth). */
const HELP = {
  name: "HELP", two_handed: true,
  dominant:    { kind: "fist", required: true, min_confidence: 0.5 },
  nondominant: { kind: "open", required: true, min_confidence: 0.5 },
  location:    { anchor: "other_hand", acting_hand: "dominant", max_dist_ratio: 0.6, required: true },
  movement:    { kind: "linear", actor: "dominant", direction: [0,-1], min_displacement_ratio: 0.15, required: true },
  orientation: { hand: "nondominant", facing: "up", required: false },
};
document.getElementById('schemaPre').innerHTML = JSON.stringify(HELP, null, 1)
  .replace(/"([^"]+)":/g, '<span class="k">"$1"</span>:')
  .replace(/: "([^"]+)"/g, ': <span class="s">"$1"</span>')
  .replace(/: (true|false|null|-?[0-9.]+)/g, ': <span class="v">$1</span>');

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1116);

const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.01, 100);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xdfeaff, 0x32323a, 2.0));
const key = new THREE.DirectionalLight(0xffffff, 2.4);
key.position.set(1.5, 3, 2.5); key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.1; key.shadow.camera.far = 20;
key.shadow.camera.left = -2; key.shadow.camera.right = 2; key.shadow.camera.top = 3; key.shadow.camera.bottom = -1;
scene.add(key);
const fill = new THREE.DirectionalLight(0x88aaff, 0.7); fill.position.set(-2, 1, 1); scene.add(fill);

const ground = new THREE.Mesh(new THREE.CircleGeometry(4, 64),
  new THREE.MeshStandardMaterial({ color: 0x161b22, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
scene.add(new THREE.GridHelper(8, 16, 0x2a3340, 0x1b2129));

const phaseLbl = document.getElementById('phaseLbl');
const clock = new THREE.Clock();
let vrm = null, modelCenter = new THREE.Vector3(0, 1, 0), modelRadius = 1, loop = true, speed = 1, t0 = 0;

/* ----------------------------------------------------------------------------
   POSE SYSTEM — VRM normalized humanoid bones (T-pose rest, +Y up, +Z forward).
   Each pose maps boneName -> [x,y,z] euler radians. We lerp between poses and
   apply every frame, then vrm.humanoid.update() maps to the raw skeleton.
   Finger fist is built from real finger-joint rotations (no mesh hacks).
---------------------------------------------------------------------------- */
const D = THREE.MathUtils.degToRad;

// Arms-at-side rest (from T-pose). Signs verified by probing (see below).
const POSE_REST = {
  leftUpperArm:  [0, 0,  D(75)], rightUpperArm: [0, 0, -D(75)],
  leftLowerArm:  [0, D(10), 0],  rightLowerArm: [0, -D(10), 0],
};
// Hands meet front-center at belly (dominant=RIGHT fist resting on LEFT open palm)
const POSE_TOGETHER = {
  leftUpperArm:  [0, D(-28), D(70)], leftLowerArm:  [0, D(-80), 0],
  rightUpperArm: [0, D(28), -D(70)], rightLowerArm: [0, D(80),  0],
  leftHand: [0,0,0], rightHand: [0,0,0],
};
// Both lift up to chest (the HELP "lifting up")
const POSE_LIFT = {
  leftUpperArm:  [0, D(-28), D(48)], leftLowerArm:  [0, D(-80), 0],
  rightUpperArm: [0, D(28), -D(48)], rightLowerArm: [0, D(80),  0],
  leftHand: [0,0,0], rightHand: [0,0,0],
};

const FINGERS = ['Index','Middle','Ring','Little'];
const SEGS = ['Proximal','Intermediate','Distal'];

function setBone(name, e) {
  const n = vrm.humanoid.getNormalizedBoneNode(name);
  if (n) n.rotation.set(e[0], e[1], e[2]);
}
function lerpPose(a, b, t) {
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  for (const k of keys) {
    const va = a[k] || [0,0,0], vb = b[k] || [0,0,0];
    setBone(k, [va[0]+(vb[0]-va[0])*t, va[1]+(vb[1]-va[1])*t, va[2]+(vb[2]-va[2])*t]);
  }
}
// Curl the dominant (right) hand into a fist. amount 0..1. Fingers curl about Z,
// thumb folds across. Signs tuned by probing.
function setFist(side, amount) {
  const s = side === 'right' ? 1 : -1;
  for (const f of FINGERS) {
    setBone(`${side}${f}Proximal`,     [0, 0, s * amount * D(90)]);
    setBone(`${side}${f}Intermediate`, [0, 0, s * amount * D(100)]);
    setBone(`${side}${f}Distal`,       [0, 0, s * amount * D(70)]);
  }
  setBone(`${side}ThumbProximal`,     [0, s * amount * D(40), 0]);
  setBone(`${side}ThumbIntermediate`, [0, s * amount * D(40), 0]);
  setBone(`${side}ThumbDistal`,       [0, s * amount * D(30), 0]);
}
function openHand(side) {
  for (const f of FINGERS) for (const sg of SEGS) setBone(`${side}${f}${sg}`, [0,0,0]);
  for (const sg of SEGS) setBone(`${side}Thumb${sg}`, [0,0,0]);
}

const easeInOut = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;

// timeline (seconds): rest -> reach(together) -> lift -> hold -> loop
const T = { reachEnd: 1.1, liftStart: 1.5, liftEnd: 2.4, hold: 3.2 };
function applyAnim(time) {
  let phase;
  if (time < T.reachEnd) {            // rest -> together
    const k = easeInOut(time / T.reachEnd);
    lerpPose(POSE_REST, POSE_TOGETHER, k);
    setFist('right', k);              // form the fist as the hand comes in
    openHand('left');
    phase = 'reaching';
  } else if (time < T.liftStart) {
    lerpPose(POSE_TOGETHER, POSE_TOGETHER, 0);
    setFist('right', 1); openHand('left'); phase = 'fist on palm';
  } else if (time < T.liftEnd) {      // lift up
    const k = easeInOut((time - T.liftStart) / (T.liftEnd - T.liftStart));
    lerpPose(POSE_TOGETHER, POSE_LIFT, k);
    setFist('right', 1); openHand('left'); phase = 'lifting up';
  } else {                            // hold
    lerpPose(POSE_LIFT, POSE_LIFT, 0);
    setFist('right', 1); openHand('left'); phase = 'hold';
  }
  phaseLbl.textContent = phase;
  return time >= T.hold;
}

const loader = new GLTFLoader();
loader.register(parser => new VRMLoaderPlugin(parser));
loader.load('1895101762715499275.vrm?t=' + Date.now(), (gltf) => { try {
  vrm = gltf.userData.vrm;
  VRMUtils.rotateVRM0(vrm);                 // VRM0 faces -Z; rotate to face +Z
  VRMUtils.removeUnnecessaryJoints(gltf.scene);
  vrm.scene.traverse(o => { if (o.isMesh) { o.castShadow = true; o.frustumCulled = false; } });
  scene.add(vrm.scene);

  const box = new THREE.Box3().setFromObject(vrm.scene);
  box.getCenter(modelCenter); const size = new THREE.Vector3(); box.getSize(size);
  modelRadius = Math.max(size.x, size.y) * 0.5;
  modelCenter.y = box.min.y + size.y * 0.62;   // focus on upper torso/hands
  ground.position.y = box.min.y;
  setView('threeq');

  t0 = clock.getElapsedTime();
  phaseLbl.textContent = 'playing HELP';
} catch (e) { showErr(e); } }, undefined, (e) => showErr(e));

function showErr(e) {
  console.error(e);
  const el = document.getElementById('err');
  el.style.display = 'block'; el.textContent = 'Load/pose error:\n' + (e && e.stack ? e.stack : e);
  phaseLbl.textContent = 'error';
}

function setView(which) {
  const c = modelCenter, r = Math.max(modelRadius, 0.5), d = r * 3.2;
  controls.target.copy(c);
  if (which === 'front')  camera.position.set(c.x, c.y + r*0.2, c.z + d);
  if (which === 'side')   camera.position.set(c.x + d, c.y + r*0.2, c.z);
  if (which === 'threeq') camera.position.set(c.x + d*0.6, c.y + r*0.3, c.z + d*0.8);
  controls.update();
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (vrm) {
    const seeking = (window.__seekTime !== undefined && window.__seekTime !== null);
    const time = seeking ? window.__seekTime : (clock.getElapsedTime() - t0) * speed;
    const done = applyAnim(time);
    if (done && loop && !seeking) t0 = clock.getElapsedTime();
    vrm.humanoid.update();
    vrm.update(dt);
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* probe hooks (used during tuning) */
window.__r = { renderer, scene, camera, controls, get vrm(){return vrm;}, get center(){return modelCenter;}, get radius(){return modelRadius;} };
window.__cap = () => { renderer.render(scene, camera); return renderer.domElement.toDataURL('image/jpeg', 0.7); };
window.__pause = false;

/* UI */
const sp = document.getElementById('speed'), spV = document.getElementById('speedV');
sp.addEventListener('input', () => { speed = +sp.value; spV.textContent = speed.toFixed(2)+'×'; }); spV.textContent='1.00×';
document.getElementById('replay').addEventListener('click', () => { t0 = clock.getElapsedTime(); });
const loopBtn = document.getElementById('loop');
loopBtn.addEventListener('click', () => { loop = !loop; loopBtn.textContent = '⟳ Loop: ' + (loop?'on':'off'); });
document.getElementById('front').addEventListener('click', () => setView('front'));
document.getElementById('side').addEventListener('click', () => setView('side'));
document.getElementById('threeq').addEventListener('click', () => setView('threeq'));
addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
</script>
</body>
</html>
